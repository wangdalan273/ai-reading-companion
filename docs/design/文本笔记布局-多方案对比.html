<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>伴读 · 文本笔记布局 · 多方案对比</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   设计 Token（全局唯一，各方案共用 → 保证风格统一、便于对比）
   ============================================================ */
:root{
  --paper:#f4f1ea;          /* 页面底色：暖纸 */
  --paper-2:#efeae0;
  --surface:#ffffff;
  --surface-2:#faf8f3;
  --ink:#222631;            /* 主文字 */
  --ink-2:#51586a;          /* 次级文字 */
  --muted:#9a9384;          /* 弱文字 */
  --line:#e6e0d4;           /* 描边 */
  --line-strong:#d6cdbd;
  --accent:#c0563b;         /* 主强调：陶土橙（阅读陪伴感，避开通用蓝/紫渐变）*/
  --accent-soft:#f7e7e1;
  --accent-ink:#9a3f29;
  --gold:#b08948;           /* 次级强调：书页金 */
  --ok:#3f8f6b; --info:#3a6ea5; --warn:#c08a2e;
  --radius:14px; --radius-sm:10px; --radius-xs:7px;
  --shadow-sm:0 1px 2px rgba(60,45,25,.06);
  --shadow-md:0 8px 22px -10px rgba(60,45,25,.28);
  --shadow-lg:0 18px 40px -16px rgba(60,45,25,.34);
  --gap:18px;
  --fs-title:15px; --fs-body:13px; --fs-sm:11.5px;
  --tap:44px;               /* 触控最小尺寸 */
  --head-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  font-family:"Noto Sans SC",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--ink);background:var(--paper);
  background-image:radial-gradient(circle at 12% 8%,rgba(192,86,59,.05),transparent 40%),
                   radial-gradient(circle at 88% 92%,rgba(176,137,72,.05),transparent 42%);
  min-height:100vh;padding-bottom:80px;
}
h1,h2,h3,.serif{font-family:"Noto Serif SC","Songti SC",serif}
button{font-family:inherit;cursor:pointer;color:inherit}
::selection{background:var(--accent-soft)}

/* ============================================================
   顶栏：品牌 + 搜索 + 排序 + 视图切换
   ============================================================ */
.app-header{
  position:sticky;top:0;z-index:30;height:var(--head-h);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:0 clamp(14px,3vw,28px);
  background:rgba(244,241,234,.82);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700}
.brand .logo{
  width:30px;height:30px;border-radius:9px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  color:#fff;display:grid;place-items:center;font-size:15px;
  box-shadow:var(--shadow-sm);
}
.brand b{font-size:15px;letter-spacing:.3px}
.brand small{display:block;font-size:10px;color:var(--muted);font-weight:400;margin-top:1px}

.search{position:relative;flex:1 1 200px;max-width:360px}
.search input{
  width:100%;height:38px;border:1px solid var(--line);border-radius:20px;
  padding:0 14px 0 36px;font-size:13px;background:var(--surface);color:var(--ink);
  transition:border-color .15s,box-shadow .15s;
}
.search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}

.sort{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)}
.sort select{
  height:34px;border:1px solid var(--line);border-radius:9px;background:var(--surface);
  padding:0 8px;font-size:12px;color:var(--ink);font-family:inherit;
}

/* 视图切换 tabs */
.tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);
  padding:4px;border-radius:12px;overflow:auto;max-width:100%}
.tabs button{
  white-space:nowrap;border:none;background:transparent;color:var(--ink-2);
  font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:9px;transition:.15s;
}
.tabs button:hover{color:var(--ink)}
.tabs button.on{background:var(--surface);color:var(--accent-ink);font-weight:600;box-shadow:var(--shadow-sm)}

/* ============================================================
   舞台
   ============================================================ */
.stage{max-width:1240px;margin:0 auto;padding:clamp(16px,3vw,26px)}
.stage-head{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stage-head h2{font-size:18px;font-weight:700}
.stage-head .count{font-size:12px;color:var(--muted)}
.stage-head .hint{margin-left:auto;font-size:12px;color:var(--muted)}

/* 通用：类型徽标 / 缩略图 / 标签 / 图标按钮 */
.type-badge{
  width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;
  color:#fff;background:var(--c,var(--accent));box-shadow:var(--shadow-sm);
}
.type-badge svg{width:18px;height:18px}
.thumb{
  width:56px;height:56px;border-radius:11px;flex:0 0 auto;position:relative;overflow:hidden;
  background:var(--cv,linear-gradient(135deg,#ccc,#999));display:grid;place-items:center;
}
.thumb svg{width:22px;height:22px;color:rgba(255,255,255,.92);filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
.chip{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:2px 9px;
}
.chip.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--c,var(--accent))}
.icon-btn{
  width:32px;height:32px;border:none;background:transparent;border-radius:9px;color:var(--muted);
  display:grid;place-items:center;transition:.15s;
}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.icon-btn.on{color:var(--accent)}
.icon-btn svg{width:17px;height:17px}
.meta{font-size:var(--fs-sm);color:var(--muted);display:flex;align-items:center;gap:5px}
.meta svg{width:13px;height:13px}
.tags{display:flex;flex-wrap:wrap;gap:6px}

/* ============================================================
   1) 卡片网格
   ============================================================ */
.layout-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:var(--gap)}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:11px;position:relative;
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--accent);opacity:0;transition:.18s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--line-strong)}
.card.is-pinned::before{opacity:1}
.card-top{display:flex;align-items:center;justify-content:space-between}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:4px;border-top:1px dashed var(--line)}
.card-title{font-size:var(--fs-title);font-weight:600;line-height:1.35}
.card-excerpt{font-size:var(--fs-body);color:var(--ink-2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-cover{height:64px;border-radius:var(--radius-sm);display:grid;place-items:center;color:#fff;
  background:var(--cv);font-family:"Noto Serif SC",serif;font-size:22px;font-weight:700;
  letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.25)}

/* ============================================================
   2) 瀑布流（CSS columns）
   ============================================================ */
.layout-masonry{column-count:3;column-gap:var(--gap)}
.layout-masonry .card{break-inside:avoid;width:100%;margin-bottom:var(--gap);display:inline-flex}
@media(max-width:1024px){.layout-masonry{column-count:2}}
@media(max-width:640px){.layout-masonry{column-count:1}}

/* ============================================================
   3) 列表
   ============================================================ */
.layout-list{display:flex;flex-direction:column;gap:10px}
.row{
  display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:11px 14px;position:relative;transition:.16s;
}
.row::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:var(--accent);opacity:0;transition:.16s}
.row:hover{background:var(--surface-2);box-shadow:var(--shadow-sm)}
.row:hover::before{opacity:1}
.row-main{min-width:0}
.row-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-excerpt{font-size:12.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:3px 0 6px}
.row-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.row-actions{display:flex;gap:2px}

/* ============================================================
   4) 时间轴
   ============================================================ */
.layout-timeline{position:relative;padding-left:26px}
.layout-timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line-strong)}
.tl-group{margin-bottom:22px}
.tl-month{position:sticky;top:var(--head-h);z-index:5;display:inline-flex;align-items:center;gap:8px;
  font-family:"Noto Serif SC",serif;font-weight:700;font-size:14px;color:var(--accent-ink);
  background:var(--paper);padding:4px 10px 4px 0;margin-left:-26px}
.tl-month .bar{width:14px;height:2px;background:var(--accent);border-radius:2px}
.tl-item{position:relative;margin-top:14px}
.tl-item::before{content:"";position:absolute;left:-22px;top:18px;width:12px;height:12px;border-radius:50%;
  background:var(--surface);border:2.5px solid var(--accent);box-shadow:0 0 0 3px var(--paper)}
.tl-item.pinned::before{background:var(--accent)}
.tl-date{font-size:11px;color:var(--muted);margin:0 0 5px 2px}

/* ============================================================
   5) 分组折叠
   ============================================================ */
.layout-group{display:flex;flex-direction:column;gap:14px}
.group{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.group-head{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none;
  background:linear-gradient(180deg,var(--surface-2),var(--surface))}
.group-head .g-icon{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;background:var(--c,var(--gold))}
.group-head .g-icon svg{width:18px;height:18px}
.group-head h3{font-size:14px;font-weight:600;flex:1}
.group-head .g-count{font-size:12px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:1px 9px}
.group-head .chev{transition:transform .22s;color:var(--muted)}
.group.collapsed .chev{transform:rotate(-90deg)}
.group-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:14px;
  transition:max-height .3s ease}
.group.collapsed .group-body{max-height:0!important;padding-top:0;padding-bottom:0;overflow:hidden}

/* ============================================================
   6) 看板
   ============================================================ */
.layout-kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(262px,1fr);gap:14px;overflow-x:auto;padding-bottom:8px}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:11px;display:flex;flex-direction:column;gap:10px;min-height:200px}
.kcol-head{display:flex;align-items:center;gap:8px;padding:3px 4px}
.kcol-head .dot{width:9px;height:9px;border-radius:50%;background:var(--c,var(--accent))}
.kcol-head h3{font-size:13px;font-weight:600;flex:1}
.kcol-head .kc{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 8px}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;display:flex;flex-direction:column;gap:8px;position:relative;transition:.16s}
.kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kcard .handle{position:absolute;top:9px;right:9px;color:var(--muted);cursor:grab}
.kcard .handle svg{width:16px;height:16px;display:block}
.kadd{margin-top:2px;border:1px dashed var(--line-strong);background:transparent;border-radius:var(--radius-sm);
  padding:9px;color:var(--ink-2);font-size:12.5px;font-weight:500;transition:.15s}
.kadd:hover{background:var(--surface);color:var(--accent-ink);border-color:var(--accent)}

/* 空状态 */
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0;font-size:13px}

/* ============================================================
   方案说明面板（随视图切换同步）
   ============================================================ */
.explain{max-width:1240px;margin:24px auto 0;padding:0 clamp(16px,3vw,26px)}
.explain-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-sm);overflow:hidden}
.explain-card .eh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--surface-2),var(--surface))}
.explain-card .eh .tag{font-size:11px;font-weight:600;color:#fff;background:var(--accent);border-radius:20px;padding:2px 10px}
.explain-card .eh h3{font-size:15px;font-weight:700}
.explain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.explain-grid .cell{padding:14px 18px;border-bottom:1px solid var(--line)}
.explain-grid .cell:nth-child(odd){border-right:1px solid var(--line)}
.explain-grid .cell h4{font-size:12.5px;color:var(--accent-ink);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.explain-grid .cell h4 .n{width:18px;height:18px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:11px;font-weight:700}
.explain-grid .cell p{font-size:12.5px;color:var(--ink-2);line-height:1.7}
@media(max-width:720px){.explain-grid{grid-template-columns:1fr}.explain-grid .cell:nth-child(odd){border-right:none}}

/* 底部 Token 速览 */
.tokens{max-width:1240px;margin:22px auto 0;padding:0 clamp(16px,3vw,26px)}
.tokens details{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:6px 16px}
.tokens summary{cursor:pointer;padding:10px 0;font-size:13px;font-weight:600;color:var(--ink)}
.tokens .tg{display:flex;flex-wrap:wrap;gap:14px;padding:8px 0 14px}
.tokens .tg .sw{display:flex;flex-direction:column;gap:4px;align-items:center;font-size:10px;color:var(--muted)}
.tokens .tg .sw i{width:30px;height:30px;border-radius:8px;border:1px solid var(--line)}

/* 响应式：移动端 */
@media(max-width:640px){
  .app-header{gap:10px}
  .search{order:3;max-width:none;flex-basis:100%}
  .tabs{order:4;flex-basis:100%}
  .layout-grid{grid-template-columns:1fr}
  .row{grid-template-columns:46px 1fr;grid-template-areas:"t m" "t s"}
  .row .thumb{width:46px;height:46px;grid-area:t}
  .row-main{grid-area:m}
  .row-side{grid-area:s;flex-direction:row;align-items:center;justify-content:space-between;width:100%;margin-top:4px}
  .layout-kanban{grid-auto-columns:82vw}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="logo">读</div>
    <div><b>伴读 · 文本笔记</b><small>布局方案对比 · 同一设计系统</small></div>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="search" type="search" placeholder="搜索标题 / 标签 / 正文…" autocomplete="off">
  </div>
  <div class="sort">
    <span>排序</span>
    <select id="sort">
      <option value="date">最近修改</option>
      <option value="title">标题 A→Z</option>
      <option value="words">字数多→少</option>
    </select>
  </div>
  <nav class="tabs" id="tabs">
    <button data-layout="grid" class="on">卡片网格</button>
    <button data-layout="masonry">瀑布流</button>
    <button data-layout="list">列表</button>
    <button data-layout="timeline">时间轴</button>
    <button data-layout="group">分组折叠</button>
    <button data-layout="kanban">看板</button>
  </nav>
</header>

<main class="stage" id="stage"></main>

<section class="explain">
  <div class="explain-card">
    <div class="eh"><span class="tag" id="ex-tag">方案 01</span><h3 id="ex-title">卡片网格</h3></div>
    <div class="explain-grid" id="ex-grid"></div>
  </div>
</section>

<section class="tokens">
  <details>
    <summary>设计 Token 速览（各方案共用，保证一致性）</summary>
    <div class="tg">
      <div class="sw"><i style="background:#f4f1ea"></i>paper</div>
      <div class="sw"><i style="background:#ffffff"></i>surface</div>
      <div class="sw"><i style="background:#222631"></i>ink</div>
      <div class="sw"><i style="background:#c0563b"></i>accent</div>
      <div class="sw"><i style="background:#b08948"></i>gold</div>
      <div class="sw"><i style="background:#e6e0d4"></i>line</div>
      <div class="sw"><i style="background:#3f8f6b"></i>ok</div>
      <div class="sw"><i style="background:#3a6ea5"></i>info</div>
    </div>
    <p style="font-size:12px;color:var(--muted);line-height:1.7;padding-bottom:12px">
      间距基准 4px 体系（gap 18px / 卡片内距 14px）；圆角 14·10·7；阴影三级 sm/md/lg；
      字号 15/13/11.5；触控目标 ≥44px；主色陶土橙 #c0563b 与正文对比度 &gt; 4.5:1，满足 WCAG AA。
    </p>
  </details>
</section>

function thumb(n){ return n.cv
  ? `<div class="thumb" style="--cv:${n.cv}">${I[n.icon]}</div>`
  : `<div class="thumb" style="--cv:linear-gradient(135deg,#efe9dd,#ddd3c0)"><span style="font-family:'Noto Serif SC',serif;font-weight:700;color:#a89c86;font-size:18px">${n.mono}</span></div>`; }
function tagsHtml(n){ return n.tags.map(t=>`<span class="chip dot" style="--c:${CATC['读书笔记']}">${t}</span>`).join(''); }
function cover(n){ return n.cv?`<div class="card-cover" style="--cv:${n.cv}">${n.mono}</div>`:''; }

function getList(){
  let a = NOTES.filter(n=>{
    if(!state.q) return true;
    const q=state.q.toLowerCase();
    return (n.title+n.excerpt+n.tags.join('')).toLowerCase().includes(q);
  });
  if(state.sort==='date') a.sort((x,y)=> y.date.localeCompare(x.date));
  if(state.sort==='title') a.sort((x,y)=> x.title.localeCompare(y.title,'zh'));
  if(state.sort==='words') a.sort((x,y)=> y.words-x.words);
  // 置顶优先
  a.sort((x,y)=> (y.pinned?1:0)-(x.pinned?1:0));
  return a;
}

/* ---------- 各布局构建器 ---------- */
function bGrid(list){
  if(!list.length) return `<div class="empty">没有匹配的笔记</div>`;
  return `<div class="layout-grid">`+list.map(n=>`
    <article class="card ${n.pinned?'is-pinned':''}">
      ${cover(n)}

          <button class="icon-btn" title="更多">${I.more}</button>
        </div>
      </div>
      <div>

}

function bTimeline(list){
  if(!list.length) return `<div class="empty">没有匹配的笔记</div>`;
  let html='',cur='';
  list.forEach(n=>{
    const m=n.date.slice(0,7);
    if(m!==cur){ cur=m; const [y,mo]=m.split('-');
      html+=`<div class="tl-group"><div class="tl-month"><span class="bar"></span>${y} 年 ${+mo} 月</div>`;
    }
    html+=`<div class="tl-item ${n.pinned?'pinned':''}">
        <div class="tl-date">${n.dateLabel}</div>
        <article class="card" style="display:flex;flex-direction:column;gap:9px">

}

  $('#ex-grid').innerHTML=ex.points.map((p,i)=>`
    <div class="cell"><h4><span class="n">${i+1}</span>${p[0]}</h4><p>${p[1]}</p></div>`).join('');
  // 置顶交互
  stage.querySelectorAll('[data-pin]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const id=+b.dataset.pin; const n=NOTES.find(x=>x.id===id); n.pinned=!n.pinned; render();
  });
}

/* ---------- 事件 ---------- */
$('#tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  state.layout=b.dataset.layout;
  $('#tabs').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
$('#search').addEventListener('input',e=>{state.q=e.target.value;render();});
$('#sort').addEventListener('change',e=>{state.sort=e.target.value;render();});

render();
</script>
</body>
</html>
