# ============================================================
#  AI 伴读（Laravel 13）— 独立子域名站点  read.sxmnq.art
#  部署位置：/etc/nginx/sites-available/companion
#  启用方式：sudo ln -s /etc/nginx/sites-available/companion /etc/nginx/sites-enabled/companion
#
#  与老项目 sxmnq.art（Node+pm2 后端 /var/www/html 前端）完全隔离：
#   - 本文件只认 read.sxmnq.art，绝不 include default，绝不碰 /var/www/html
#   - 独立日志、独立 webroot、独立 PHP-FPM socket（php8.4-fpm）
#
#  注意：本文件先只配 HTTP(80)。证书就绪后由
#        `sudo certbot --nginx -d read.sxmnq.art`
#        自动追加 443 server block 并把 80 重定向到 443（无需手改）。
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name read.sxmnq.art;

    root /var/www/companion/public;
    index index.php;

    # 上传上限：与 php.ini upload_max_filesize=512M 及 Livewire 上限对齐
    client_max_body_size 512M;

    # 独立日志，便于单独排查，不影响老项目
    access_log /var/log/nginx/companion.access.log;
    error_log  /var/log/nginx/companion.error.log;

    # 禁止访问隐藏文件（含 .env / .git / .htaccess）
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # Laravel 前端路由（静态资源找不到时回退到 index.php）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 经 php8.4-fpm 处理。
    # socket 路径以服务器实际为准，先执行 `ls /run/php/` 确认（通常是 php8.4-fpm.sock）
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # 构建产物（CSS/JS/字体/图片）长缓存
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
